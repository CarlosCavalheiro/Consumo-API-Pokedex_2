<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <!--HEADER-->
    <header>        
        <div class="container text-light text-center p-5 header-pokemon">
            <img src="./images/logo_pokedex.png">
            <img src="./images/pokebola_1.png">
        </div>
    </header>

    <!--Main-->
    <main>
        <div class="container bg-light text-light p-5 d-flex justify-content-between align-items-center">
            <div class="d-flex justify-content-center align-items-center gap-3">
                <img src="./images/ico_pokedex.png">
                <span class="fs-4" id="total-pokemon">000</span>
            </div>
            <div class="d-flex justify-content-center align-items-center gap-3">
                <input type="text" class="form-control" placeholder="Digite o nome do Pokémon">
                <button class="btn btn-primary">Pesquisar</button>
            </div>
        </div>
        <div class="container bg-white text-dark p-5 d-flex flex-wrap gap-3" id="listar-pokemons"></div>
    </main>

    <!--Footer-->
    <footer>
        <div class="container text-light text-center p-5 footer-pokemon">
            <h4>Consumo de API - Pokedex - 2026</h4>
            <p>Carlos Cavalheiro - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
